# Nome da aplicańŃo
spring.application.name=Palomalumi

# Configurań§es do Neon (PostgreSQL)
###spring.datasource.url=jdbc:postgresql://ep-summer-bar-acgeeljx-pooler.sa-east-1.aws.neon.tech/neondb
spring.datasource.url=jdbc:postgresql://localhost/aves?sslmode=disable
spring.datasource.username=postgres
spring.datasource.password=postgre
#spring.datasource.username=neondb_owner
#spring.datasource.password=npg_EX8PvbKNpMc6
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurań§es JPA/Hibernate para PostgreSQL
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update


# Configurań§es do Pool de ConexŃo (HikariCP)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.data-source-properties.sslmode=require
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
server.port=8083
spring.jpa.open-in-view=false