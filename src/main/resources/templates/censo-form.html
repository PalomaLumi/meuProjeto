<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Censo</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/censo-style.css}">
</head>
<body>

<div th:if="${session.usuarioLogado != null}"
     style="background:#f0f0f0;padding:12px;margin-bottom:20px;
            border-bottom:2px solid #ccc;font-family:Roboto;">

    Usuário logado:
    <strong th:text="${session.usuarioLogado.login}"></strong>

    <a th:href="@{/logout}"
       style="float:right;color:#c00;font-weight:bold;text-decoration:none;">
        Logout
    </a>
</div>



<form th:action="@{/censo}" th:object="${censo}" method="post">


        <input type="hidden" th:field="*{id}" />


    <h1>Dados de Navegação</h1>


    <label>Direção Navegação(Graus):</label>
    <input type="number" step="0.01" th:field="*{direcaoNavegacao}" required><br>


    <label>Velocidade Navegação (nós):</label>
    <input type="number" step="0.01" th:field="*{velocidadeNavegacao}" required><br>


    <label>Velocidade Vento (nós):</label>
    <input type="number" step="0.01" th:field="*{velocidadeVento}" required><br>


    <label>Direção Vento (graus):</label>
    <input type="number" step="0.01" th:field="*{direcaoVento}" required><br>


    <label>Pressão:</label>
    <input type="number" step="0.01" th:field="*{pressao}" required><br>


    <label>Latitude (° ‘):</label>
    <input type="number" step="0.000001" th:field="*{latitude}" required><br>


    <label>Longitude (° ‘):</label>
    <input type="number" step="0.000001" th:field="*{longitude}" required><br>


    <label>Profundidade (m):</label>
    <input type="number" step="0.01" th:field="*{profundidade}" required><br>




    <label>Observador :</label>
    <select th:field="*{observador.id}" required>
        <option value="">Selecione...</option>
        <option th:each="u : ${usuarios}" th:value="${u.id}" th:text="${u.username}"></option>
    </select>



    <h3>&#128038; Aves Seguidoras</h3>

    <table>
        <thead>
        <tr>
            <th>Espécie</th>
            <th>Contagem</th>
            <th>Ação</th>
        </tr>
        </thead>
        <tbody id="leituraSeguidoras">
        <tr th:each="l, iter : *{leituras}">
            <td>
                <input type="text"
                       th:field="*{leituras[__${iter.index}__].especie}"
                       required>
            </td>
            <td>
                <div class="contador">
                    <button type="button" onclick="mudarContagem(this, -1)">-</button>
                    <input type="number"
                           th:field="*{leituras[__${iter.index}__].contagem}"
                           min="0" required readonly>
                    <button type="button" onclick="mudarContagem(this, 1)">+</button>
                    <input type="hidden" th:field="*{leituras[__${iter.index}__].tipo}" />
                </div>
            </td>
            <td>
                <button type="button" onclick="removerLinha(this)">Remover</button>
            </td>
        </tr>
        </tbody>
    </table>

    <button type="button" onclick="adicionarLinhaSeguidora()">Adicionar Ave</button>

    <h3>&#128038;Censo Continuo</h3>

    <table>
        <thead>
        <tr>
            <th>Espécie</th>
            <th>Contagem</th>
            <th>Ação</th>
        </tr>
        </thead>
        <tbody id="leituraContinuo">
        <tr th:each="l, iter : *{leituras}">
            <td>
                <input type="text"
                       th:field="*{leituras[__${iter.index}__].especie}"
                       required>
            </td>
            <td>
                <div class="contador">
                    <button type="button" onclick="mudarContagem(this, -1)">-</button>
                    <input type="number"
                           th:field="*{leituras[__${iter.index}__].contagem}"
                           min="0" required readonly>
                    <button type="button" onclick="mudarContagem(this, 1)">+</button>
                    <input type="hidden" th:field="*{leituras[__${iter.index}__].tipo}" />
                </div>
            </td>
            <td>
                <button type="button" onclick="removerLinha(this)">Remover</button>
            </td>
        </tr>
        </tbody>
    </table>



    <button type="button" onclick="adicionarLinhaContinuo()">Adicionar Ave</button>

    <br><br>

    <button type="submit">Salvar</button>
    <a th:href="@{/censo}">Cancelar</a>

</form>
<script>

    function removerLinha(btn) {
        btn.parentNode.parentNode.remove();
    }

    // Função genérica para adicionar linhas, adaptável por ID e Prefix
    function mudarContagem(btn, valor) {
        let input = btn.parentNode.querySelector('input[type="number"]');
        let contagemAtual = parseInt(input.value) || 0;
        let novaContagem = contagemAtual + valor;
        if (novaContagem >= 0) {
            input.value = novaContagem;
        }
    }
function adicionarLinha(tbodyId, prefixo, tipoLeitura) {
    let tbody = document.getElementById(tbodyId);

    // Calcular índice global da lista leituras
    let totalSeguidoras = document.getElementById("leituraSeguidoras").rows.length;
    let totalContinuo = document.getElementById("leituraContinuo").rows.length;

    let index = totalSeguidoras + totalContinuo;  // AQUI É A MÁGICA

    let linha = document.createElement("tr");
    linha.innerHTML = `
        <td><input type="text" name="${prefixo}[${index}].especie" required></td>
        <td>
            <div class="contador">
                <button type="button" onclick="mudarContagem(this, -1)">-</button>
                <input type="number" name="${prefixo}[${index}].contagem" min="0" readonly required>
                <button type="button" onclick="mudarContagem(this, 1)">+</button>
            </div>
        </td>
        <input type="hidden" name="${prefixo}[${index}].tipo" value="${tipoLeitura}">
        <td><button type="button" onclick="removerLinha(this)">Remover</button></td>
    `;

    tbody.appendChild(linha);
}


    // Funções específicas para os botões

  function adicionarLinhaSeguidora() {
        adicionarLinha("leituraSeguidoras", "leituras", "SEGUIDORA");
    }

    function adicionarLinhaContinuo() {
        adicionarLinha("leituraContinuo", "leituras", "CONTINUO");
    }


</script>

</body>
</html>
