<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Observadores</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/lista-style.css}">
</head>
<body>

<h1>Observadores</h1>

<a href="/observadores/novo">Novo Observador</a>

<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Instituição</th>
        <th>Experiência</th>
        <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="o : ${observadores}">
        <td th:text="${o.id}"></td>
        <td th:text="${o.nome}"></td>
        <td th:text="${o.instituicao}"></td>
        <td th:text="${o.experiencia}"></td>

        <td>
            <a th:href="@{/observadores/editar/{id}(id=${o.id})}">Editar</a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
