<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Observador</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/censo-style.css}">
</head>

<body class="container py-4">

<h1 th:text="${observador.id != null ? 'Editar Observador' : 'Novo Observador'}"></h1>

<form th:action="@{/observadores/salvar}" th:object="${observador}" method="post" class="mt-4">

    <input type="hidden" th:field="*{id}"/>

    <!-- Nome -->
    <div class="mb-3">
        <label>Nome</label>
        <input class="form-control" th:field="*{nome}" required>
    </div>

    <!-- Instituição -->
    <div class="mb-3">
        <label>Instituição</label>
        <input class="form-control" th:field="*{instituicao}" required>
    </div>

    <!-- Experiência -->
    <div class="mb-3">
        <label>Nível de Experiência</label>
        <select class="form-select" th:field="*{experiencia}">
            <option value="">Selecione...</option>
            <option th:each="e : ${experiencias}"
                    th:value="${e}"
                    th:text="${e}">
            </option>
        </select>
    </div>

    <!-- Usuário -->
    <div class="mb-3">
        <label>Usuário associado</label>
        <select class="form-select" th:field="*{usuario.id}">
            <option value="">Selecione...</option>
            <option th:each="u : ${usuarios}"
                    th:value="${u.id}"
                    th:text="${u.login}">
            </option>
        </select>
    </div>

    <button class="btn btn-success">Salvar</button>
    <a href="/observadores" class="btn btn-secondary">Cancelar</a>

</form>

</body>
</html>
